# Template installing all dependencies.
parameters:
  - name: nodeVersion
    type: string
    default: 24.16.0
  - name: pnpmStorePath
    type: string
    default: $(Pipeline.Workspace)/.pnpm-store
steps:
  - task: UseDotNet@2
    inputs:
      version: 8.0.x

  - task: NodeTool@0
    inputs:
      versionSpec: ${{ parameters.nodeVersion }}
    displayName: Install Node.js
    retryCountOnTaskFailure: 3

  # typespec-java is in the pnpm workspace, so the repo-wide `pnpm build` builds
  # its emitter.jar via Maven and therefore needs a JDK. The emitter targets
  # JDK 11 (see mise.toml `java = microsoft-11`). Maven is preinstalled on the
  # hosted image.
  - task: JavaToolInstaller@0
    displayName: "Use Java 11"
    inputs:
      versionSpec: "11"
      jdkArchitectureOption: "x64"
      jdkSourceOption: "PreInstalled"

  - task: Cache@2
    inputs:
      key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
      path: ${{ parameters.pnpmStorePath }}
    displayName: Cache pnpm store
  - script: npm install -g pnpm # Pnpm manage-package-manager-versions will respect packageManager field
    displayName: Install pnpm
  - script: pnpm config set store-dir ${{ parameters.pnpmStorePath }}
    displayName: Setup pnpm cache dir

  - script: |
      echo "Node:"
      node -v
      echo "Pnpm:"
      pnpm -v
    displayName: "Log tool versions used"

  # purge before install to ensure a clean state between retries
  - script: pnpm install
    displayName: Install JavaScript Dependencies
    retryCountOnTaskFailure: 3
