resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release
    - repository: azure-sdk-build-tools
      type: git
      name: internal/azure-sdk-build-tools
      ref: refs/tags/azure-sdk-build-tools_20260702.2

parameters:
  - name: stages
    type: stageList
    default: []
  - name: variables
    type: object
    default: {}
  - name: Use1ESOfficial
    type: boolean
    default: true

extends:
  ${{ if and(parameters.Use1ESOfficial, eq(variables['System.TeamProject'], 'internal')) }}:
    template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  ${{ else }}:
    template: v1/1ES.Unofficial.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    # Route 'go' CLI traffic through the centralized internal Go module proxy so
    # `go` invocations during emitter code generation (e.g. typespec-go
    # tspcompile) can resolve public modules in network-isolated CI agents.
    # See https://aka.ms/goproxy_for_how_to_onboard
    featureFlags:
      golang:
        internalModuleProxy:
          enabled: true
    settings:
      skipBuildTagsForGitHubPullRequests: true
      networkIsolationPolicy: Permissive, CFSClean
    sdl:
      autobaseline:
        enableForGitHub: true
        isEnabledForAllTools: true
      git:
        longpaths: true
      codeql:
        compiled:
          enabled: false
          justificationForDisabling: CodeQL times our pipelines out by running for 2+ hours before being force canceled.
      credscan:
        suppressionsFile: $(Build.SourcesDirectory)/eng/CredScanSuppression.json
      sourceAnalysisPool:
        name: azsdk-pool
        image: windows-2022
        os: windows
      psscriptanalyzer:
        compiled: true
        break: true
      eslint:
        enabled: false # we are running our own

    stages:
      - ${{ each stage in parameters.stages }}:
          - ${{ each pair in stage }}:
              ${{ if ne(pair.key, 'variables') }}:
                ${{ pair.key }}: ${{ pair.value }}
            variables:
              - template: /eng/pipelines/templates/variables/image.yml@self
              - ${{ each variable in parameters.variables }}:
                  - ${{ if variable.key }}:
                      # turn objects into name/value lists
                      - name: ${{ variable.key }}
                        value: ${{ variable.value }}
                  - ${{ else }}:
                      # preserve all other variables
                      - ${{ variable }}
              - ${{ each variable in stage.variables }}:
                  - ${{ if variable.key }}:
                      # turn objects into name/value lists
                      - name: ${{ variable.key }}
                        value: ${{ variable.value }}
                  - ${{ else }}:
                      # preserve all other variables
                      - ${{ variable }}
