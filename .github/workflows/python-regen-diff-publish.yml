name: Python Regen Diff Publish

# Companion to python-regen-diff.yml. Runs after that workflow finishes, in the
# base-repo context (so GITHUB_TOKEN has write access even for fork PRs), then:
#   1. downloads the rendered diff-site artifact,
#   2. publishes it to GitHub Pages under pr/<num>/,
#   3. upserts a sticky PR comment linking to the preview.
# Uses only the built-in GITHUB_TOKEN — no PAT / extra secret.

on:
  workflow_run:
    workflows: ["Python Regen Diff"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write
  actions: read

concurrency:
  group: python-regen-diff-publish-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  publish:
    name: "Publish diff preview"
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download diff site artifact
        uses: actions/download-artifact@v8
        with:
          name: python-regen-diff
          path: diff-site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read PR metadata
        id: meta
        run: |
          set -euo pipefail
          if [ ! -f diff-site/pr.txt ]; then
            echo "No pr.txt in artifact; nothing to publish."
            echo "pr=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR="$(tr -d '[:space:]' < diff-site/pr.txt)"
          # pr.txt is built on the (untrusted) fork PR runner, so treat it as
          # tainted: a non-numeric value here would otherwise reach shell path
          # operations (rm -rf / mkdir / cp) below and enable path traversal.
          if ! printf '%s' "$PR" | grep -Eq '^[0-9]+$'; then
            echo "::error::PR number from artifact is not a positive integer: '$PR'"
            exit 1
          fi
          echo "pr=$PR" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Pages
        if: steps.meta.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.meta.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          url="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          tmp="$(mktemp -d)"
          if ! git clone --depth 1 --branch gh-pages "$url" "$tmp" 2>/dev/null; then
            git clone --depth 1 "$url" "$tmp"
            git -C "$tmp" checkout --orphan gh-pages
            git -C "$tmp" rm -rf . >/dev/null 2>&1 || true
            printf '<!doctype html><meta charset="utf-8"><title>TypeSpec diff previews</title><h1>TypeSpec generated-diff previews</h1>' > "$tmp/index.html"
          fi
          rm -rf "$tmp/pr/${PR}"
          mkdir -p "$tmp/pr/${PR}"
          cp -r diff-site/. "$tmp/pr/${PR}/"
          rm -f "$tmp/pr/${PR}/pr.txt"
          git -C "$tmp" config user.name "github-actions[bot]"
          git -C "$tmp" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tmp" add -A
          if git -C "$tmp" commit -m "Update Python regen diff preview for PR #${PR}"; then
            git -C "$tmp" push origin gh-pages
          else
            echo "No changes to publish."
          fi

      - name: Upsert PR comment
        if: steps.meta.outputs.pr != ''
        uses: actions/github-script@v7
        env:
          PR: ${{ steps.meta.outputs.pr }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(process.env.PR);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // Append a short-SHA cache-buster: re-runs publish to the same
            // pr/<num>/ path, and GitHub Pages' CDN serves a stale index.html
            // without a fresh query string (the file count would look outdated).
            const fullSha = (context.payload.workflow_run || {}).head_sha || '';
            const shortSha = fullSha.slice(0, 7);
            const pagesUrl = `https://${owner}.github.io/${repo}/pr/${prNumber}/${shortSha ? `?v=${shortSha}` : ''}`;

            let summary = { changed: true, filesChanged: 0, additions: 0, deletions: 0, baselineTag: '', note: undefined };
            try {
              summary = JSON.parse(fs.readFileSync('diff-site/summary.json', 'utf8'));
            } catch (e) {
              core.warning(`Could not read summary.json: ${e}`);
            }

            // summary.json is produced on the untrusted fork PR runner, so every
            // field is tainted. Coerce/validate before embedding in the comment to
            // prevent markdown/link injection into a comment posted with a token
            // that has issues:write + pull-requests:write.
            const intOr0 = (v) => (Number.isFinite(Number(v)) ? Math.trunc(Number(v)) : 0);
            const filesChanged = intOr0(summary.filesChanged);
            const additions = intOr0(summary.additions);
            const deletions = intOr0(summary.deletions);
            const changed = summary.changed === true;
            const safeTag =
              typeof summary.baselineTag === 'string' && /^[\w./-]{1,128}$/.test(summary.baselineTag)
                ? summary.baselineTag
                : '';
            // Allow a short, single-line, plain-text note only; neutralize markdown
            // controls and any embedded URLs/HTML.
            const safeNote =
              typeof summary.note === 'string'
                ? summary.note
                    .replace(/[\r\n]+/g, ' ')
                    .replace(/[`<>[\]()*_~|]/g, '')
                    .replace(/https?:\/\/\S+/gi, '[link removed]')
                    .trim()
                    .slice(0, 280)
                : '';

            const marker = '<!-- python-regen-diff -->';
            const statsLine = changed
              ? `**${filesChanged}** files changed · \`+${additions}\` / \`-${deletions}\``
              : '✅ No differences from the baseline.';
            const tagLine = safeTag
              ? `Baseline tag: \`${safeTag}\``
              : '_Baseline not bootstrapped yet — entire output shown as added._';
            const noteLine = safeNote ? `\n> ⚠️ ${safeNote}\n` : '';

            // When the PR changes generated output, the contributor must refresh
            // the external baseline and pin the new tag in assets.json (test-proxy
            // "push" model), so the baseline travels with the PR.
            const actionBlock = changed
              ? [
                  '',
                  '<details><summary>👇 This PR changes generated output — update the baseline</summary>',
                  '',
                  'Review the rendered diff above. If the changes are expected, refresh the',
                  'baseline and pin the new tag so it ships with this PR:',
                  '',
                  '```bash',
                  'cd packages/typespec-python',
                  'pnpm run regenerate            # produce fresh generated output',
                  'pnpm run regenerate:push-assets  # publish baseline + bump assets.json',
                  '```',
                  '',
                  'Then commit the updated `packages/typespec-python/assets.json` (its',
                  '`Tag` now points at the new baseline). Pushing it makes this check pass',
                  'with **0 differences**.',
                  '</details>',
                ].join('\n')
              : '';

            const body = [
              marker,
              '### 🐍 Python emitter — generated test diff',
              '',
              statsLine,
              '',
              `👉 **[View the rendered HTML diff](${pagesUrl})**`,
              noteLine,
              actionBlock,
              `<sub>${tagLine} · updated for the latest commit. Re-runs of CI refresh this preview.</sub>`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              core.info('Created new diff comment');
            }

            // Gate the PR (test-proxy "push" model): a generated diff means the
            // contributor must regenerate and pin the new baseline tag in
            // assets.json. Surface that as a commit status on the PR head so it
            // can be made a required check; it flips to success once the
            // regenerated output matches the baseline (0 differences).
            if (fullSha) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: fullSha,
                context: 'python-regen-diff/baseline',
                state: changed ? 'failure' : 'success',
                target_url: pagesUrl,
                description: changed
                  ? `${filesChanged} file(s) differ — regenerate and bump assets.json`
                  : 'Generated output matches the baseline',
              });
              core.info(`Set commit status (${changed ? 'failure' : 'success'}) on ${fullSha}`);
            } else {
              core.warning('No head SHA available; skipping commit status.');
            }
