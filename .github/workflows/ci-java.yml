name: "typespec-java / CI"

on:
  pull_request:
    branches:
      - main
      - release/*
    paths:
      - "packages/typespec-java/**"
      - ".github/workflows/ci-java.yml"
  merge_group:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm install
      - name: Build typespec-java package
        run: pnpm turbo run --filter "@azure-tools/typespec-java..." build
  unit-test:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm install
      - name: Build typespec-java package
        run: pnpm turbo run --filter "@azure-tools/typespec-java..." build
      - name: Run unit tests
        working-directory: packages/typespec-java
        run: pnpm unit-test && pnpm test-next
  e2e-test:
    name: Run end-to-end Spector tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm install
      - name: Build typespec-java package
        run: pnpm turbo run --filter "@azure-tools/typespec-java..." build
      - name: Copy TypeSpec files
        working-directory: packages/typespec-java
        run: pnpm copy:typespec
      - name: Run Modular Spector tests
        working-directory: packages/typespec-java
        run: pnpm integration-test-ci:azure-modular
      - name: Check git tree is clean
        working-directory: packages/typespec-java
        run: pnpm check:tree
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup
      - name: Install dependencies
        run: pnpm install
      - name: Run linters
        working-directory: packages/typespec-java
        run: pnpm lint
