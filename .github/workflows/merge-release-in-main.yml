name: Merge release branch back into main

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - "release/*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # Create PR
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate branch name
        id: branchname
        env:
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          echo "branchname=backmerge/${REF_NAME}-$(date +'%Y-%m-%d')-${RUN_ID}-${RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
      - name: Create branch
        env:
          BRANCH: ${{ steps.branchname.outputs.branchname }}
        run: |
          git checkout -b "$BRANCH"
          git push --set-upstream origin "$BRANCH"
      - name: Create pull request
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BASE_BRANCH: main
          BRANCH: ${{ steps.branchname.outputs.branchname }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = process.env.BASE_BRANCH;
            const branch = process.env.BRANCH;
            const releaseBranch = process.env.RELEASE_BRANCH;
            const head = `${owner}:${branch}`;
            const title = `Backmerge ${releaseBranch} into ${base}`;
            const body = [
              "## Summary",
              "",
              `Automated backmerge PR for \`${releaseBranch}\` into \`${base}\`.`,
              "",
              `- Source branch: \`${releaseBranch}\``,
              `- Backmerge branch: \`${branch}\``,
            ].join("\n");

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base,
            });

            if (pulls.length > 0) {
              core.info(`PR already exists: ${pulls[0].html_url}`);
              return;
            }

            const { data: pull } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
            });

            core.info(`Created PR: ${pull.html_url}`);
