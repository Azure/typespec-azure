name: Documentation Update Scheduler

# This workflow uses the GitHub Copilot SDK to automatically update documentation
# for any configured package. Configs are defined in eng/scripts/doc-updater/configs/.
#
# To add a new package:
#   1. Create a YAML config in eng/scripts/doc-updater/configs/
#   2. Create prompt files in eng/scripts/doc-updater/prompts/<name>/
#   3. The workflow will auto-discover it — no changes needed here.

on:
  schedule:
    # Run weekly on Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      config:
        description: "Package config to run ('all' runs every config in parallel)"
        required: false
        default: "all"
        type: string
      focus_area:
        description: "Documentation area to focus on"
        required: false
        default: "all"
        type: string
      phase:
        description: "Pipeline phase to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - knowledge
          - doc-update
      full_rebuild:
        description: "Force full knowledge rebuild (ignore incremental cache)"
        required: false
        default: false
        type: boolean
      model:
        description: "Model to use for the agent"
        required: false
        default: "claude-opus-4.6"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Discover which configs to run
  # -----------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve config matrix
        id: resolve
        run: |
          CONFIG_INPUT="${{ github.event.inputs.config || 'all' }}"
          CONFIGS_DIR="eng/scripts/doc-updater/configs"

          if [ "$CONFIG_INPUT" = "all" ]; then
            # Discover all YAML config files
            CONFIGS=$(ls "$CONFIGS_DIR"/*.yaml 2>/dev/null | xargs -I{} basename {} .yaml | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            # Single config or comma-separated list
            CONFIGS=$(echo "$CONFIG_INPUT" | tr ',' '\n' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi

          echo "Resolved configs: $CONFIGS"
          echo "matrix=$CONFIGS" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------------------
  # Job 2: Run doc-updater for each config (parallel via matrix)
  # -----------------------------------------------------------------------
  update-docs:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        config: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: "21"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install repo dependencies
        run: pnpm install

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Install doc-updater dependencies
        working-directory: eng/scripts/doc-updater
        run: npm install

      - name: Run doc-updater
        working-directory: eng/scripts/doc-updater
        run: |
          FOCUS="${{ github.event.inputs.focus_area || 'all' }}"
          PHASE="${{ github.event.inputs.phase || 'all' }}"
          FULL_REBUILD="${{ github.event.inputs.full_rebuild || 'false' }}"
          MODEL="${{ github.event.inputs.model || 'claude-opus-4.6' }}"

          REBUILD_FLAG=""
          if [ "$FULL_REBUILD" = "true" ]; then
            REBUILD_FLAG="--full-rebuild"
          fi

          npx tsx src/index.ts \
            --config "${{ matrix.config }}" \
            --focus "$FOCUS" \
            --phase "$PHASE" \
            --model "$MODEL" \
            $REBUILD_FLAG

      - name: Set run date
        id: date
        run: echo "value=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          branch: automated/doc-update-${{ matrix.config }}-${{ steps.date.outputs.value }}-${{ github.run_number }}
          title: "[Automated] Update ${{ matrix.config }} documentation (${{ steps.date.outputs.value }})"
          body: |
            Automated documentation update via Copilot SDK.

            **Config:** ${{ matrix.config }}
            **Phase:** ${{ github.event.inputs.phase || 'all' }}
            **Focus area:** ${{ github.event.inputs.focus_area || 'all' }}
            **Full rebuild:** ${{ github.event.inputs.full_rebuild || 'false' }}
            **Model:** ${{ github.event.inputs.model || 'claude-opus-4.6' }}
            **Date:** ${{ steps.date.outputs.value }}

            This PR was created by the [doc-update-scheduler workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          commit-message: "docs: automated ${{ matrix.config }} update (${{ steps.date.outputs.value }})"
          delete-branch: true

      - name: Record PR number in metadata
        if: steps.create-pr.outputs.pull-request-number
        env:
          PR_BRANCH: automated/doc-update-${{ matrix.config }}-${{ steps.date.outputs.value }}-${{ github.run_number }}
        run: |
          META_FILE="eng/scripts/doc-updater/knowledge/${{ matrix.config }}.meta.json"
          if [ -f "$META_FILE" ]; then
            git checkout "$PR_BRANCH"
            jq '.lastPrNumber = ${{ steps.create-pr.outputs.pull-request-number }}' "$META_FILE" > tmp.json && mv tmp.json "$META_FILE"
            git add "$META_FILE"
            git commit -m "chore: record PR number in metadata"
            git push
          fi

      - name: Job Summary
        run: |
          echo "## Documentation Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Config:** ${{ matrix.config }}" >> $GITHUB_STEP_SUMMARY
          echo "**Phase:** ${{ github.event.inputs.phase || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Focus Area:** ${{ github.event.inputs.focus_area || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Full Rebuild:** ${{ github.event.inputs.full_rebuild || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** ${{ github.event.inputs.model || 'claude-opus-4.6' }}" >> $GITHUB_STEP_SUMMARY
