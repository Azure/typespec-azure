name: Package Size Comment

# Posts the package-size report produced by `package-size.yml` as a sticky PR comment.
# Runs on `workflow_run` so it has a `pull-requests: write` token even for fork PRs,
# while never building any untrusted PR code here.
# See https://securitylab.github.com/research/github-actions-preventing-pwn-requests/

on:
  workflow_run:
    workflows: ["Package Size"]
    types:
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download comment artifact
        uses: actions/download-artifact@v4
        with:
          name: package-size-comment
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./comment-artifact

      - name: Post or update sticky comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- bundle-size-report -->";
            const prNumber = Number(
              fs.readFileSync("./comment-artifact/pr-number.txt", "utf8").trim(),
            );
            const body = fs.readFileSync("./comment-artifact/comment.md", "utf8");

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid PR number: ${prNumber}`);
              return;
            }

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
