# yaml-language-server: $schema=../spector-config/spector.config.schema.json
#
# Spec selection for @typespec/http-specs (opt-in).
# See design/spector-test-selection.md. 'module' is the Go module name;
# other options are @azure-tools/typespec-go emitter options.

specs:
  "authentication/api-key": { options: { module: apikeygroup } }
  "authentication/http/custom": { options: { module: customgroup } }
  "authentication/oauth2": { options: { module: oauth2group } }
  "authentication/union": { options: { module: unionauthgroup } }
  "encode/bytes": { options: { module: bytesgroup } }
  "encode/datetime": { options: { module: datetimegroup, slice-elements-byval: true } }
  "encode/duration": { options: { module: durationgroup } }
  "encode/numeric": { options: { module: numericgroup } }
  "parameters/basic": { options: { module: basicparamsgroup } }
  "parameters/body-optionality": { options: { module: bodyoptionalgroup } }
  "parameters/collection-format": { options: { module: collectionfmtgroup } }
  "parameters/path": { options: { module: pathgroup } }
  "parameters/query": { options: { module: querygroup } }
  "parameters/spread": { options: { module: spreadgroup } }
  "payload/content-negotiation": { options: { module: contentneggroup } }
  "payload/json-merge-patch": { options: { module: jmergepatchgroup } }
  "payload/media-type": { options: { module: mediatypegroup } }
  "payload/multipart": { options: { module: multipartgroup } }
  # missing continuation-token support: https://github.com/Azure/autorest.go/issues/1494
  "payload/pageable": { options: { module: pageablegroup } }
  "payload/xml": { options: { module: xmlgroup, slice-elements-byval: true } }
  "serialization/encoded-name/json": { options: { module: jsongroup } }
  "server/endpoint/not-defined": { options: { module: noendpointgroup } }
  "server/path/multiple": { options: { module: multiplegroup } }
  "server/path/single": { options: { module: singlegroup } }
  "server/versions/not-versioned": { options: { module: unversionedgroup } }
  "server/versions/versioned": { options: { module: versionedgroup } }
  "special-headers/conditional-request": { options: { module: condreqgroup } }
  special-words: { options: { module: specialwordsgroup } }
  "type/array": { options: { module: arraygroup, slice-elements-byval: true } }
  "type/dictionary": { options: { module: dictionarygroup } }
  "type/enum/extensible": { options: { module: extensiblegroup } }
  "type/enum/fixed": { options: { module: fixedgroup } }
  "type/model/empty": { options: { module: emptygroup, single-client: true } }
  "type/model/inheritance/enum-discriminator": { options: { module: enumdiscgroup } }
  "type/model/inheritance/not-discriminated": { options: { module: nodiscgroup } }
  "type/model/inheritance/recursive":
    { options: { module: recursivegroup, slice-elements-byval: true } }
  "type/model/inheritance/single-discriminator": { options: { module: singlediscgroup } }
  "type/model/usage": { options: { module: usagegroup } }
  "type/model/visibility": { options: { module: visibilitygroup } }
  "type/property/nullable": { options: { module: nullablegroup } }
  # missing plain time support: https://github.com/Azure/autorest.go/issues/1732
  "type/property/optionality": { options: { module: optionalitygroup, slice-elements-byval: true } }
  "type/property/value-types": { options: { module: valuetypesgroup, slice-elements-byval: true } }
  "type/scalar": { options: { module: scalargroup, slice-elements-byval: true } }
  "versioning/madeOptional": { options: { module: madeoptionalgroup } }
  "versioning/returnTypeChangedFrom": { options: { module: rettypechangedfromgroup } }
  "versioning/typeChangedFrom": { options: { module: typechangedfromgroup } }

  # --- Not generated yet (tracked skips) ---
  # TODO: https://github.com/Azure/autorest.go/issues/1606
  "response/status-code-range": false
  # TODO: https://github.com/Azure/autorest.go/issues/1730
  routes: false
  # requires union support
  "special-headers/repeatability": false
  # TODO: https://github.com/Azure/autorest.go/issues/1594
  "streaming/jsonl": false
  # not a real scenario
  "type/model/inheritance/nested-discriminator": false
  # requires union support
  "type/property/additional-properties": false
  # requires union support
  "type/union": false
  # requires union support
  "type/union/discriminated": false
  # requires union support
  "versioning/added": false
  # requires union support
  "versioning/removed": false
  # requires union support
  "versioning/renamedFrom": false
