# yaml-language-server: $schema=../../spector-runner/schema/dist/SpectorConfig.json
#
# Spec selection for @azure-tools/typespec-java (opt-in), for the shared
# http-specs / azure-http-specs specs. See Azure/typespec-azure#4997.
# Options are @azure-tools/typespec-java emitter options (without the prefix).
# Local ./tsp/*.tsp fixtures are handled separately in Generate.ps1.

specs:
  authentication/api-key: true
  authentication/http/custom: true
  authentication/noauth/union: true
  authentication/oauth2: true
  authentication/union: true
  azure/client-generator-core/access: true
  azure/client-generator-core/alternate-type: true
  azure/client-generator-core/api-version/client-api-versions: true
  azure/client-generator-core/api-version/header: true
  azure/client-generator-core/api-version/path: true
  azure/client-generator-core/api-version/query: true
  azure/client-generator-core/client-default-value: true
  azure/client-generator-core/client-doc: true
  azure/client-generator-core/client-initialization/default: { options: { enable-subclient: true } }
  azure/client-generator-core/client-initialization/individually: { options: { enable-subclient: true } }
  azure/client-generator-core/client-initialization/individuallyParent: { options: { enable-subclient: true } }
  azure/client-generator-core/client-location/move-method-parameter-to-client: true
  azure/client-generator-core/client-location/move-to-existing-sub-client: true
  azure/client-generator-core/client-location/move-to-new-sub-client: true
  azure/client-generator-core/client-location/move-to-root-client: true
  azure/client-generator-core/deserialize-empty-string-as-null: true
  azure/client-generator-core/exact-name: true
  azure/client-generator-core/flatten-property: true
  azure/client-generator-core/hierarchy-building: true
  azure/client-generator-core/next-link-verb: true
  azure/client-generator-core/override: true
  azure/client-generator-core/response-as-bool: true
  azure/client-generator-core/usage: true
  azure/core/basic: true
  azure/core/lro/rpc: true
  azure/core/lro/standard: true
  azure/core/model: true
  azure/core/page: true
  azure/core/scalar: true
  azure/core/traits: true
  azure/encode/duration: true
  azure/example/basic: { options: { examples-dir: "{project-root}/specs/azure/example/basic/examples" } }
  azure/payload/pageable: true
  azure/resource-manager/common-properties: { options: { generate-tests: false } }
  azure/resource-manager/large-header: { options: { generate-tests: false } }
  azure/resource-manager/management-group: { options: { generate-tests: false } }
  azure/resource-manager/method-subscription-id: true
  azure/resource-manager/multi-service: true
  azure/resource-manager/multi-service-shared-models: { options: { metadata-suffix: shared-models } }
  azure/resource-manager/non-resource: { options: { generate-tests: false } }
  azure/resource-manager/operation-templates: { options: { generate-tests: false } }
  azure/resource-manager/resources: { options: { generate-tests: false } }
  azure/resource-manager/service-group: { options: { generate-tests: false } }
  azure/special-headers/client-request-id: true
  azure/special-headers/conditional-request: true
  azure/versioning/previewVersion: true
  client/namespace: true
  client/naming: true
  client/naming/enum-conflict: true
  client/overload: true
  client/structure/client-operation-group: true
  client/structure/default: true
  client/structure/multi-client: true
  client/structure/renamed-operation: true
  client/structure/two-operation-group: true
  documentation: true
  encode/array: true
  encode/boolean: true
  encode/bytes: true
  encode/datetime: true
  encode/duration: true
  encode/numeric: true
  parameters/basic: true
  parameters/body-optionality: true
  parameters/body-root: true
  parameters/collection-format: true
  parameters/path: true
  parameters/query: true
  parameters/spread: true
  payload/content-negotiation: true
  payload/head: true
  payload/json-merge-patch: true
  payload/media-type: true
  payload/multipart: true
  payload/xml: true
  resiliency/srv-driven/main.tsp: { options: { advanced-versioning: true } }
  resiliency/srv-driven/old.tsp: { options: { namespace: resiliency.servicedriven.v1, advanced-versioning: true } }
  response/status-code-range: true
  routes: true
  serialization/encoded-name/json: true
  server/endpoint/not-defined: true
  server/path/multiple: true
  server/path/single: true
  server/versions/not-versioned: true
  server/versions/versioned: true
  service/multi-service: true
  service/multiple-services: true
  special-headers/conditional-request: true
  special-headers/repeatability: true
  special-words: true
  streaming/jsonl: true
  streaming/sse: true
  type/array: { options: { use-object-for-unknown: true } }
  type/dictionary: { options: { use-object-for-unknown: true } }
  type/enum/extensible: { options: { namespace: type.enums.extensible } }
  type/enum/fixed: { options: { namespace: type.enums.fixed } }
  type/file: true
  type/model/empty: true
  type/model/inheritance/enum-discriminator: true
  type/model/inheritance/nested-discriminator: true
  type/model/inheritance/not-discriminated: true
  type/model/inheritance/recursive: true
  type/model/inheritance/single-discriminator: true
  type/model/usage: true
  type/model/visibility: true
  type/property/additional-properties: true
  type/property/nullable: true
  type/property/optionality: true
  type/property/value-types: true
  type/scalar: true
  type/union: true
  type/union/discriminated: true
  versioning/added: true
  versioning/madeOptional: true
  versioning/removed: true
  versioning/renamedFrom: true
  versioning/returnTypeChangedFrom: true
  versioning/typeChangedFrom: true

  # Disabled: nested pageItems/nextLink/continuationToken not supported
  payload/pageable: false
