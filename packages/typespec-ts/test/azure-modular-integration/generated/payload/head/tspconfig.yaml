emit:
  - "@azure-tools/typespec-ts"
options:
  "@azure-tools/typespec-ts":
    emitter-output-dir: "{project-root}"
    generate-metadata: true
    generate-test: false
    add-credentials: false
    flavor: azure
    include-headers-in-response: true
    package-details:
      name: "@msinternal/payload-head"
      description: "Payload Head Test Service"
